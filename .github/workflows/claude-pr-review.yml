name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  basic-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: |
          echo "Checking Python syntax..."
          errors=0
          for f in *.py; do
            if ! python3 -m py_compile "$f"; then
              echo "FAIL: $f"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors file(s) failed syntax check"
            exit 1
          fi
          echo "All Python files pass syntax check"

      - name: Import validation
        run: |
          echo "Validating core module imports..."
          python3 -c "
          import sys
          skip = ['local_image_generator', 'color_transfer', 'test_prompt', 'generate_deck_art']
          modules = [
              'deck_studio',
              'backend_config',
              'card_frame_renderer',
              'prompt_generator',
              'vision_analyzer',
              'mlx_llm',
              'fetch_scryfall_art',
              'fetch_flavor_text',
              'scryfall_client',
              'fetch_mtg_fonts',
              'build_pips_from_mana',
              'build_reference_collage',
          ]
          failed = []
          for mod in modules:
              try:
                  __import__(mod)
                  print(f'  OK: {mod}')
              except Exception as e:
                  print(f'  FAIL: {mod} — {e}')
                  failed.append(mod)
          if failed:
              print(f'\n{len(failed)} module(s) failed to import: {failed}')
              sys.exit(1)
          print('\nAll core modules import successfully')
          "

      - name: Run pytest suite
        run: python -m pytest tests/ -q --tb=short --no-header

      - name: Flask server health check
        run: |
          echo "Starting Flask server on port 5099..."
          python3 deck_studio.py --port 5099 > /tmp/flask-server.log 2>&1 &
          SERVER_PID=$!

          # Wait up to 45s for the server to come up (first start downloads
          # MTG fonts, which can be slow on runners). curl failing must not
          # abort the -e shell — always fall through to the log dump below.
          up=0
          for i in $(seq 1 45); do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited during startup"
              break
            fi
            status=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:5099/" || true)
            if [ "$status" = "200" ]; then
              up=1
              echo "Server up after ${i}s"
              break
            fi
            sleep 1
          done

          errors=0
          if [ "$up" = "1" ]; then
            for endpoint in "/" "/api/status" "/api/decks" "/api/model-config"; do
              status=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:5099${endpoint}" || true)
              if [ "$status" = "200" ]; then
                echo "  OK: ${endpoint} → ${status}"
              else
                echo "  FAIL: ${endpoint} → ${status}"
                errors=$((errors + 1))
              fi
            done
          else
            echo "Server never became healthy"
            errors=1
          fi

          kill $SERVER_PID 2>/dev/null || true

          if [ "$errors" -gt 0 ]; then
            echo "Server log:"
            cat /tmp/flask-server.log
            exit 1
          fi
          echo "All health checks passed"

      - name: Extension manifest validation
        run: |
          python3 -c "
          import json, sys
          with open('extension/manifest.json') as f:
              m = json.load(f)
          required = ['manifest_version', 'name', 'version', 'description', 'permissions']
          missing = [k for k in required if k not in m]
          if missing:
              print(f'Missing required fields: {missing}')
              sys.exit(1)
          if m['manifest_version'] != 3:
              print(f'Expected MV3, got MV{m[\"manifest_version\"]}')
              sys.exit(1)
          print(f'Extension manifest valid: {m[\"name\"]} v{m[\"version\"]} (MV3)')
          "

